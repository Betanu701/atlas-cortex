# Atlas Satellite — Generic ESP32-S3 Build
#
# Hardware: ESP32-S3 + INMP441 microphone + MAX98357A amplifier
# See README.md for wiring diagram.
#
# Usage:
#   1. Create secrets.yaml with wifi_ssid and wifi_password
#   2. Set atlas_server below to your server IP/hostname
#   3. Run: esphome run generic-esp32-s3.yaml

esphome:
  name: atlas-satellite
  friendly_name: Atlas Satellite
  platform: ESP32
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atlas-Satellite-Fallback"
    password: "atlas-setup"

captive_portal:

logger:

api:

ota:

# ── Audio I/O ─────────────────────────────────────────────────────

i2s_audio:
  # Microphone bus (INMP441)
  - id: i2s_in
    i2s_lrclk_pin: GPIO6   # WS
    i2s_bclk_pin: GPIO5    # SCK
  # Speaker bus (MAX98357A)
  - id: i2s_out
    i2s_lrclk_pin: GPIO17  # LRC
    i2s_bclk_pin: GPIO16   # BCLK

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO4     # SD
    pdm: false
    bits_per_sample: 16bit
    channel: left

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: GPIO15   # DIN

# ── Status LED (WS2812 on GPIO48) ────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO48
    num_leds: 1
    rmt_channel: 0
    chipset: WS2812
    rgb_order: GRB

# ── Atlas Satellite Component ─────────────────────────────────────
# Custom ESPHome component that speaks the Atlas WebSocket protocol.
# See components/atlas_satellite/ and PROTOCOL.md for details.
#
# NOTE: The C++ component is a stub — see atlas_satellite.h for the
# protocol state machine and implementation TODOs.

external_components:
  - source:
      type: local
      path: components
    components: [atlas_satellite]

atlas_satellite:
  server_url: "ws://atlas-server.local:5100/ws/satellite"
  device_name: "atlas-satellite"
  hardware: "generic"
  microphone: mic
  speaker: spk
  status_led: status_led
  sample_rate: 16000
  bits_per_sample: 16
