# Atlas Satellite — Satellite1 by FutureProofHomes
#
# 4-mic XMOS XU316 array, 25W Class-D amplifier, temperature/humidity
# sensor, mmWave presence sensor.
#
# The XMOS processor handles beam-forming and AEC before passing a
# clean single-channel audio stream to the ESP32-S3 over I2S.
#
# Usage:
#   1. Create secrets.yaml with wifi_ssid and wifi_password
#   2. Set atlas_server below to your server IP/hostname
#   3. Run: esphome run satellite1.yaml

esphome:
  name: atlas-satellite1
  friendly_name: Atlas Satellite (Satellite1)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Atlas-Sat1-Fallback"
    password: "atlas-setup"

captive_portal:

logger:

api:

ota:

# ── Audio I/O (XMOS XU316 → ESP32 I2S) ──────────────────────────
#
# The XMOS XU316 handles:
#   - 4-mic beam-forming
#   - Acoustic Echo Cancellation (AEC)
#   - Noise suppression
# Output: clean single-channel 16kHz 16-bit PCM over I2S

i2s_audio:
  # Mic input (from XMOS processed output)
  - id: i2s_in
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO7
  # Speaker output (to 25W Class-D amp)
  - id: i2s_out
    i2s_lrclk_pin: GPIO12
    i2s_bclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO8
    pdm: false
    bits_per_sample: 16bit
    channel: left

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: GPIO14

# ── Status LEDs (12x WS2812 ring) ────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    pin: GPIO48
    num_leds: 12
    rmt_channel: 0
    chipset: WS2812
    rgb_order: GRB

# ── Sensors ──────────────────────────────────────────────────────

i2c:
  sda: GPIO3
  scl: GPIO4

sensor:
  # AHT20 temperature / humidity
  - platform: aht10
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    update_interval: 60s

# ── Physical button (top of unit) ────────────────────────────────

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Action Button"
    id: action_button

# ── Atlas Satellite Component ─────────────────────────────────────

external_components:
  - source:
      type: local
      path: components
    components: [atlas_satellite]

atlas_satellite:
  server_url: "ws://atlas-server.local:5100/ws/satellite"
  device_name: "atlas-satellite1"
  hardware: "satellite1"
  microphone: mic
  speaker: spk
  status_led: status_led
  sample_rate: 16000
  bits_per_sample: 16
