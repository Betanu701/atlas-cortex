name: atlas-satellite
version: '0.0.2'
summary: Atlas personal AI satellite agent
description: |
  Satellite agent for Atlas personal AI. Handles wake word detection,
  audio capture/playback, WebSocket communication with Atlas server,
  and kiosk display management.

base: core24
grade: stable
confinement: strict

apps:
  atlas-satellite:
    command: bin/start-satellite
    daemon: simple
    restart-condition: always
    plugs:
      - network
      - network-bind
      - audio-playback
      - audio-record
      - pulseaudio
      - alsa
      - wayland
      - opengl

  setup-tui:
    command: bin/atlas-setup-tui
    plugs:
      - network
      - network-manager
      - network-control

  configure-wifi:
    command: bin/configure-wifi
    plugs:
      - network-manager
      - network-control

parts:
  satellite-agent:
    plugin: dump
    source: satellite/
    organize:
      atlas_satellite/: lib/atlas_satellite/
      tablet/atlas-setup-tui.py: bin/atlas-setup-tui
    stage:
      - atlas_satellite/**
      - tablet/atlas-setup-tui.py
    override-build: |
      craftctl default
      chmod +x $CRAFT_PART_INSTALL/bin/atlas-setup-tui

  python-deps:
    plugin: python
    source: satellite/
    python-packages:
      - aiohttp
      - websockets
      - numpy
      - pyalsaaudio
    build-packages:
      - python3-dev
      - libasound2-dev
    stage-packages:
      - python3
      - alsa-utils
      - avahi-utils

  start-script:
    plugin: dump
    source-type: local
    source: satellite/snap/scripts/
    organize:
      start-satellite.sh: bin/start-satellite
      configure-wifi.sh: bin/configure-wifi
    override-build: |
      craftctl default
      chmod +x $CRAFT_PART_INSTALL/bin/start-satellite
      chmod +x $CRAFT_PART_INSTALL/bin/configure-wifi

layout:
  /opt/atlas-satellite:
    bind: $SNAP_DATA/config
