# GPU override for AMD ROCm (primary LLM GPU) + NVIDIA RTX 4060 (Orpheus TTS).
# Derek's Overwatch setup:
#   GPU 0 (AMD RX 7900 XT, 20GB) → LLM (Ollama ROCm) + Whisper STT (Vulkan)
#   GPU 1 (NVIDIA RTX 4060, 8GB)  → Orpheus TTS (vLLM CUDA)
#
# Vulkan sees AMD GPU. NVIDIA uses nvidia-container-toolkit runtime.
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu-amd.yml up -d

services:
  # AMD ROCm for main LLM
  atlas-ollama:
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri/card1:/dev/dri/card1
      - /dev/dri/renderD129:/dev/dri/renderD129
    group_add:
      - video

  # NVIDIA RTX 4060 (CUDA) for Orpheus TTS via nvidia runtime
  atlas-orpheus:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  # AMD Vulkan for whisper.cpp STT (device 0 = AMD after NVIDIA is isolated)
  atlas-whisper:
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - GGML_VK_VISIBLE_DEVICES=0
