services:
  # ── Atlas Cortex — main server + admin UI ───────────────────────
  # Uses host networking so satellites on the LAN can connect via
  # WebSocket and mDNS, and so the server can SSH to satellites for
  # provisioning. Internal services are reached via localhost ports.
  atlas-cortex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: atlas-cortex:latest
    container_name: atlas-cortex
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${ATLAS_DATA_BASE:-/mnt/fastpool/atlas}/data:/data
      - ${ATLAS_DATA_BASE:-/mnt/fastpool/atlas}/models/loras:/loras:ro
    environment:
      # LLM — runs on primary GPU (atlas-ollama, port 11434)
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_URL=${LLM_URL:-http://localhost:11434}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - MODEL_FAST=${MODEL_FAST:-qwen3.5:9b}
      - MODEL_THINKING=${MODEL_THINKING:-qwen3.5:27b}
      - MODEL_EMBEDDING=${MODEL_EMBEDDING:-nomic-embed-text}
      # TTS — Qwen3-TTS primary (port 7860), Kokoro fast (port 8880), Orpheus (port 5005), Piper fallback (port 10200), Fish Audio stories (port 8860)
      - TTS_PROVIDER=${TTS_PROVIDER:-qwen3_tts}
      - QWEN_TTS_HOST=${QWEN_TTS_HOST:-localhost}
      - QWEN_TTS_PORT=${QWEN_TTS_PORT:-7860}
      - KOKORO_HOST=${KOKORO_HOST:-localhost}
      - KOKORO_PORT=${KOKORO_PORT:-8880}
      - KOKORO_VOICE=${KOKORO_VOICE:-af_bella}
      - ORPHEUS_FASTAPI_URL=${ORPHEUS_FASTAPI_URL:-http://localhost:5005}
      - PIPER_HOST=${PIPER_HOST:-localhost}
      - PIPER_PORT=${PIPER_PORT:-10200}
      - FISH_AUDIO_HOST=${FISH_AUDIO_HOST:-localhost}
      - FISH_AUDIO_PORT=${FISH_AUDIO_PORT:-8860}
      # STT — whisper.cpp Vulkan (port 10300)
      - STT_BACKEND=${STT_BACKEND:-whisper_cpp}
      - STT_HOST=${STT_HOST:-localhost}
      - STT_PORT=${STT_PORT:-10300}
      - CORTEX_DATA_DIR=/data
      - CORTEX_PORT=${CORTEX_PORT:-5100}
      - TZ=${TZ:-America/New_York}
    depends_on:
      atlas-piper:
        condition: service_started
      atlas-whisper:
        condition: service_started
      atlas-ollama:
        condition: service_started
      atlas-qwen-tts:
        condition: service_started

  # ── Piper TTS — Wyoming protocol (port 10200) ──────────────────
  # CPU-only fallback TTS. ~140MB RAM, sub-second synthesis.
  # Used for instant responses when GPU TTS latency is too high.
  atlas-piper:
    image: lscr.io/linuxserver/piper:latest
    container_name: atlas-piper
    restart: unless-stopped
    ports:
      - "10200:10200"
    volumes:
      - atlas-piper-data:/config
    environment:
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}
      - PIPER_VOICE=${PIPER_VOICE:-en_US-lessac-medium}
      - PIPER_LENGTH=${PIPER_LENGTH:-1.0}
      - PIPER_NOISE=${PIPER_NOISE:-0.667}
      - PIPER_NOISEW=${PIPER_NOISEW:-0.333}
      - PIPER_SPEAKER=${PIPER_SPEAKER:-0}
      - PIPER_PROCS=${PIPER_PROCS:-1}
    networks:
      - atlas
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -w 2 localhost 10200 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Kokoro TTS — OpenAI-compatible API (port 8880) ──────────────
  # Non-autoregressive 82M-param model: sub-second to ~5s synthesis
  # on CPU. Much faster than autoregressive Orpheus for real-time use.
  # 67 built-in voice packs, natural sounding.
  atlas-kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: atlas-kokoro
    restart: unless-stopped
    ports:
      - "8880:8880"
    networks:
      - atlas
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8880/v1/audio/voices > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── Whisper.cpp STT — HTTP API (port 10300) ──────────────────────
  # Speech-to-text via whisper.cpp with Vulkan GPU acceleration.
  # GPU: Shares primary GPU with Ollama (sequential workload, no contention).
  atlas-whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main-vulkan
    container_name: atlas-whisper
    restart: unless-stopped
    depends_on:
      atlas-whisper-init:
        condition: service_completed_successfully
    ports:
      - "10300:10300"
    volumes:
      - atlas-whisper-data:/models
    environment:
      - GGML_VK_VISIBLE_DEVICES=${WHISPER_VK_DEVICE:-0}
    entrypoint: ["/app/build/bin/whisper-server"]
    command:
      - -m
      - /models/ggml-${WHISPER_MODEL:-large-v3-turbo-q5_0}.bin
      - -l
      - ${WHISPER_LANG:-en}
      - -bs
      - ${WHISPER_BEAM:-5}
      - --host
      - 0.0.0.0
      - --port
      - "10300"
      - --convert
      - --suppress-nst
      - --no-speech-thold
      - "0.6"
    networks:
      - atlas
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10300/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  # ── Whisper model downloader (init container) ──────────────────
  atlas-whisper-init:
    image: alpine:latest
    container_name: atlas-whisper-init
    restart: "no"
    volumes:
      - atlas-whisper-data:/models
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo-q5_0}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MODEL="ggml-$${WHISPER_MODEL}.bin"
        if [ -f "/models/$$MODEL" ]; then
          echo "Model $$MODEL already exists, skipping download"
          exit 0
        fi
        echo "Downloading whisper model: $$MODEL"
        apk add --no-cache curl
        curl -L --retry 3 -o "/models/$$MODEL" \
          "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/$$MODEL"
        echo "Download complete: $$MODEL ($$(du -h /models/$$MODEL | cut -f1))"
    networks:
      - atlas

  # ── Ollama LLM — primary GPU (port 11434) ──────────────────────
  # Main LLM backend on the largest GPU. Runs qwen2.5/qwen3.
  # GPU: Use override files for AMD ROCm, Intel, or NVIDIA.
  atlas-ollama:
    image: ${OLLAMA_LLM_IMAGE:-ollama/ollama:latest}
    container_name: atlas-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${ATLAS_DATA_BASE:-/mnt/fastpool/atlas}/models/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-0}
      - OLLAMA_MODELS=/root/.ollama/models
    networks:
      - atlas
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET / HTTP/1.0\\n\\n\" > /dev/tcp/localhost/11434'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Orpheus TTS — single llama.cpp CUDA + SNAC container (port 5005) ─
  # All-in-one Orpheus TTS: llama.cpp CUDA for inference, SNAC for audio.
  # Single NVIDIA GPU (RTX 4060 8GB target). GGUF model (~2.2GB VRAM).
  # Model auto-downloaded on first run via init container.
  # Fallback when Qwen3-TTS is unavailable.
  atlas-orpheus:
    build:
      context: ./orpheus-vllm
      dockerfile: Dockerfile
    image: atlas-orpheus-vllm:latest
    container_name: atlas-orpheus
    restart: unless-stopped
    ports:
      - "5005:5005"
    volumes:
      - atlas-orpheus-models:/models
    environment:
      - ORPHEUS_MODEL_PATH=/models/${ORPHEUS_MODEL_NAME:-Orpheus-3b-FT-Q4_K_M.gguf}
      - ORPHEUS_PORT=5005
      - ORPHEUS_HOST=0.0.0.0
      - LLAMA_GPU_LAYERS=${LLAMA_GPU_LAYERS:-99}
      - LLAMA_CTX_SIZE=${LLAMA_CTX_SIZE:-4096}
    networks:
      - atlas
    depends_on:
      atlas-orpheus-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Model init — downloads Orpheus GGUF on first run ────────────
  atlas-orpheus-init:
    image: alpine:latest
    volumes:
      - atlas-orpheus-models:/models
    environment:
      - ORPHEUS_MODEL_NAME=${ORPHEUS_MODEL_NAME:-Orpheus-3b-FT-Q4_K_M.gguf}
    command: >
      sh -c '
      apk add --no-cache curl;
      MODEL="$$ORPHEUS_MODEL_NAME";
      REPO=$$(echo "$$MODEL" | sed "s/\.gguf$$//");
      if [ ! -f "/models/$$MODEL" ]; then
        echo "Downloading Orpheus model ($$MODEL)...";
        curl -fL -o "/models/$$MODEL" "https://huggingface.co/lex-au/$${REPO}.gguf/resolve/main/$$MODEL";
      else
        echo "Orpheus model already exists";
      fi'
    restart: "no"

  # ── Qwen3-TTS — primary GPU TTS (port 7860) ────────────────────
  # ValyrianTech/Qwen3-TTS_server — FastAPI server with voice cloning,
  # multi-language support. Build locally: ~8GB image + 3.5GB model.
  # Requires NVIDIA GPU with 4GB+ VRAM (1.7B model).
  atlas-qwen-tts:
    build:
      context: https://github.com/ValyrianTech/Qwen3-TTS_server.git
    image: atlas-qwen-tts:latest
    container_name: atlas-qwen-tts
    ports:
      - "${QWEN_TTS_PORT:-7860}:7860"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - atlas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Fish Speech — story narration TTS (port 8860) ───────────────
  # fishaudio/fish-speech — multi-speaker dialogue, voice cloning.
  # Optional service for story mode and character voice narration.
  atlas-fish-tts:
    image: fishaudio/fish-speech:latest
    container_name: atlas-fish-tts
    ports:
      - "8860:8080"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - atlas
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  atlas:
    driver: bridge

volumes:
  atlas-piper-data:
    driver: local
  atlas-whisper-data:
    driver: local
  atlas-orpheus-models:
    driver: local
