# GPU override for Intel-only systems (single GPU).
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu-intel.yml up -d
#
# Note: Orpheus vLLM requires CUDA. On Intel-only systems,
# Orpheus will not work — use Kokoro as primary TTS.

services:
  atlas-ollama:
    devices:
      - /dev/dri:/dev/dri
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_VULKAN=1
    group_add:
      - video

  atlas-whisper:
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
