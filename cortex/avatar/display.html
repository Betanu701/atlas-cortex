<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
    #avatar-container {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0f172a;
      perspective: 800px;
    }
    #avatar-mover {
      position: absolute;
      width: 60vmin; height: 60vmin;
      will-change: left, top, transform;
    }
    #avatar-scaler {
      width: 100%; height: 100%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: center center;
    }
    #avatar-svg-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #avatar-svg-wrap svg { width: 100%; height: 100%; }
    /* Smooth transitions on SVG groups */
    #avatar-svg-wrap g { transition: opacity 0.12s ease-in-out; }
    /* Status indicator */
    #status {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      font: 12px/1 system-ui, sans-serif; color: #64748b;
      opacity: 0.5; transition: opacity 0.3s;
    }
    #status.active { color: #22c55e; opacity: 1; }
    #status.listening { color: #3b82f6; opacity: 1; }
    #status.error { color: #ef4444; opacity: 1; }
    #audio-unlock {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15,23,42,0.85); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    #audio-unlock span {
      color: #fff; font-size: 2rem; font-family: sans-serif;
      padding: 1.5rem 3rem; border: 2px solid #fff; border-radius: 1rem;
    }
  </style>
</head>
<body>
  <div id="audio-unlock" onclick="this.remove(); window._audioUnlocked=true;">
    <span>🔊 Tap to enable audio</span>
  </div>
  <div id="avatar-container">
    <div id="avatar-mover">
      <div id="avatar-scaler">
        <div id="avatar-svg-wrap"></div>
      </div>
    </div>
  </div>
  <div id="status">connecting…</div>

  <script>
    const VISEMES = [
      'IDLE','PP','FF','TH','DD','KK','SS','SH','RR','NN','IH','EH','AA','OH','OU'
    ];
    const EXPRESSIONS = [
      'neutral','happy','thinking','surprised','sad','excited','concerned','listening',
      'laughing','crying','silly','winking','angry','confused','love','sleepy','proud','scared'
    ];

    // Expression-to-animation mapping (Nick Jr. style movement behaviors)
    const EXPR_ANIMATIONS = {
      neutral:   { drift: true,  scale: 1.0,  squash: false, shake: false, bounce: false, spin: false, tilt: 0 },
      happy:     { drift: true,  scale: 1.05, squash: false, shake: false, bounce: true,  spin: false, tilt: 0 },
      thinking:  { drift: false, scale: 1.0,  squash: false, shake: false, bounce: false, spin: false, tilt: 12 },
      surprised: { drift: false, scale: 1.15, squash: true,  shake: false, bounce: false, spin: false, tilt: 0 },
      sad:       { drift: true,  scale: 0.92, squash: false, shake: false, bounce: false, spin: false, tilt: -8 },
      excited:   { drift: true,  scale: 1.12, squash: false, shake: false, bounce: true,  spin: false, tilt: 0 },
      concerned: { drift: false, scale: 0.97, squash: false, shake: false, bounce: false, spin: false, tilt: 5 },
      listening: { drift: false, scale: 1.02, squash: false, shake: false, bounce: false, spin: false, tilt: -5 },
      laughing:  { drift: true,  scale: 1.08, squash: true,  shake: true,  bounce: true,  spin: false, tilt: 0 },
      crying:    { drift: false, scale: 0.88, squash: false, shake: true,  bounce: false, spin: false, tilt: -6 },
      silly:     { drift: true,  scale: 1.1,  squash: true,  shake: false, bounce: true,  spin: true,  tilt: 15 },
      winking:   { drift: true,  scale: 1.05, squash: false, shake: false, bounce: false, spin: false, tilt: 8 },
      angry:     { drift: false, scale: 1.06, squash: false, shake: true,  bounce: false, spin: false, tilt: 0 },
      confused:  { drift: true,  scale: 1.0,  squash: false, shake: false, bounce: false, spin: false, tilt: -15 },
      love:      { drift: true,  scale: 1.08, squash: false, shake: false, bounce: true,  spin: false, tilt: 0 },
      sleepy:    { drift: true,  scale: 0.9,  squash: false, shake: false, bounce: false, spin: false, tilt: -10 },
      proud:     { drift: false, scale: 1.1,  squash: false, shake: false, bounce: false, spin: false, tilt: 0 },
      scared:    { drift: false, scale: 0.85, squash: true,  shake: true,  bounce: false, spin: false, tilt: 0 },
    };

    let ws = null;
    let currentViseme = 'IDLE';
    let currentExpr = 'neutral';
    let blinkInterval = null;
    let breatheInterval = null;
    let visemeTimeout = null;
    let driftInterval = null;
    let pupilInterval = null;
    let expressionAnimFrame = null;
    let shakeTimeout = null;
    let bounceInterval = null;
    let _syncedVisemeTimers = [];
    let _currentSkinUrl = null;

    // Client-side text → viseme mapping (simple phoneme approximation)
    const CHAR_VISEME = {
      'a': 'AA', 'e': 'EH', 'i': 'IH', 'o': 'OH', 'u': 'OU',
      'b': 'PP', 'p': 'PP', 'm': 'PP',
      'f': 'FF', 'v': 'FF',
      't': 'DD', 'd': 'DD', 'l': 'DD', 'n': 'NN',
      'k': 'KK', 'g': 'KK', 'c': 'KK', 'q': 'KK',
      's': 'SS', 'z': 'SS', 'x': 'SS',
      'r': 'RR', 'w': 'RR',
      'j': 'SH', 'y': 'SH',
      'h': 'IH',
    };
    function scheduleSyncedVisemes(text, audioDurationMs, startDelayMs) {
      // Cancel any pending synced visemes
      _syncedVisemeTimers.forEach(t => clearTimeout(t));
      _syncedVisemeTimers = [];

      // Scale viseme timing to match actual audio duration
      const charCount = text.replace(/[\s.,!?]/g, '').length || 1;
      const msPerChar = audioDurationMs / (charCount + text.length * 0.15);

      let elapsed = 0;
      const lower = text.toLowerCase();
      for (let i = 0; i < lower.length; i++) {
        const ch = lower[i];
        if (ch === ' ' || ch === '.' || ch === ',' || ch === '!' || ch === '?') {
          elapsed += msPerChar * 0.5;
          const pauseDelay = startDelayMs + elapsed;
          _syncedVisemeTimers.push(setTimeout(() => showViseme('IDLE'), pauseDelay));
          continue;
        }
        const viseme = CHAR_VISEME[ch];
        if (viseme) {
          const d = startDelayMs + elapsed;
          _syncedVisemeTimers.push(setTimeout(() => showViseme(viseme), d));
        }
        elapsed += msPerChar;
      }
      // Return to IDLE after text completes
      _syncedVisemeTimers.push(setTimeout(() => showViseme('IDLE'), startDelayMs + audioDurationMs));
    }

    const room = new URLSearchParams(location.search).get('room') || 'default';
    const statusEl = document.getElementById('status');
    const container = document.getElementById('avatar-svg-wrap');
    const mover = document.getElementById('avatar-mover');
    const scaler = document.getElementById('avatar-scaler');

    // ── Web Audio API for TTS playback ────────────────────────
    let audioCtx = null;
    let audioQueue = [];       // Queued PCM chunks as Float32Arrays
    let audioPlaying = false;
    let audioSampleRate = 24000;
    let currentSessionId = null;
    let _isSpeaking = false;   // True from SPEAKING_START to SPEAKING_END
    let _neutralResetTimer = null;
    let _hasReceivedAudio = false; // True once first TTS_CHUNK arrives

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: audioSampleRate });
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    let _sentenceAudioStart = 0; // ctx.currentTime when this sentence's audio begins
    let _sentenceSamples = 0;    // total PCM samples for this sentence

    function handleTtsStart(msg) {
      currentSessionId = msg.session_id;
      audioSampleRate = msg.sample_rate || 24000;
      audioQueue = [];
      audioPlaying = true;
      _pendingTtsText = msg.text || '';
      _sentenceSamples = 0;
      // Cancel any pending neutral reset
      if (_neutralResetTimer) { clearTimeout(_neutralResetTimer); _neutralResetTimer = null; }
      // Recreate context if sample rate changed
      if (audioCtx && audioCtx.sampleRate !== audioSampleRate) {
        audioCtx.close();
        audioCtx = null;
      }
      const ctx = ensureAudioContext();
      // Record where this sentence's audio will start in the playback timeline
      _sentenceAudioStart = Math.max(ctx.currentTime, nextPlayTime);
      console.log(`[${(performance.now()/1000).toFixed(2)}s] TTS start:`, msg.text?.substring(0, 60), 'rate:', audioSampleRate);
    }

    let _pendingTtsText = '';

    function handleTtsChunk(msg) {
      _hasReceivedAudio = true;
      const ctx = ensureAudioContext();
      // Decode base64 → PCM 16-bit LE → Float32
      const raw = atob(msg.audio);
      const int16 = new Int16Array(raw.length / 2);
      for (let i = 0; i < int16.length; i++) {
        int16[i] = raw.charCodeAt(i * 2) | (raw.charCodeAt(i * 2 + 1) << 8);
      }
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 32768.0;
      }
      _sentenceSamples += float32.length;
      audioQueue.push(float32);
      scheduleAudioPlayback();
      doTalkPulse();
    }

    let nextPlayTime = 0;

    function scheduleAudioPlayback() {
      const ctx = ensureAudioContext();
      while (audioQueue.length > 0) {
        const samples = audioQueue.shift();
        const buffer = ctx.createBuffer(1, samples.length, audioSampleRate);
        buffer.getChannelData(0).set(samples);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        const now = ctx.currentTime;
        const startAt = Math.max(now, nextPlayTime);
        source.start(startAt);
        nextPlayTime = startAt + buffer.duration;
      }
    }

    function handleTtsEnd(msg) {
      audioPlaying = false;
      _hasReceivedAudio = false;
      // Schedule visemes NOW — we know total audio duration
      if (_pendingTtsText) {
        const ctx = ensureAudioContext();
        const audioDurationMs = (_sentenceSamples / audioSampleRate) * 1000;
        const delayUntilStart = Math.max(0, (_sentenceAudioStart - ctx.currentTime) * 1000);
        console.log(`[${(performance.now()/1000).toFixed(2)}s] TTS end — scheduling visemes: ${audioDurationMs.toFixed(0)}ms audio, ${delayUntilStart.toFixed(0)}ms delay, text: "${_pendingTtsText.substring(0,30)}"`);
        scheduleSyncedVisemes(_pendingTtsText, audioDurationMs, delayUntilStart);
      } else {
        console.log(`[${(performance.now()/1000).toFixed(2)}s] TTS end (no text)`);
      }
      _pendingTtsText = '';
      _sentenceSamples = 0;
    }

    // How many ms of audio is still queued for playback
    function audioRemainingMs() {
      const ctx = ensureAudioContext();
      return Math.max(0, (nextPlayTime - ctx.currentTime) * 1000);
    }

    // Center the face initially
    const centerX = () => (window.innerWidth - mover.offsetWidth) / 2;
    const centerY = () => (window.innerHeight - mover.offsetHeight) / 2;
    let posX = 0, posY = 0;

    function initPosition() {
      posX = centerX();
      posY = centerY();
      mover.style.left = posX + 'px';
      mover.style.top = posY + 'px';
    }

    // ── WebSocket connection ──────────────────────────────────
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${location.host}/ws/avatar?room=${encodeURIComponent(room)}`;
      statusEl.textContent = 'connecting…';
      statusEl.className = '';

      ws = new WebSocket(url);
      ws.onopen = () => {
        statusEl.textContent = 'connected';
        statusEl.className = 'active';
        setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'PING' }));
          }
        }, 30000);
      };
      ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
      ws.onclose = () => {
        statusEl.textContent = 'disconnected — reconnecting…';
        statusEl.className = 'error';
        setTimeout(connect, 3000);
      };
      ws.onerror = () => ws.close();
    }

    // ── Message handler ───────────────────────────────────────
    function handleMessage(msg) {
      const ts = (performance.now()/1000).toFixed(2);
      if (msg.type !== 'PONG' && msg.type !== 'VISEME') {
        console.log(`[${ts}s] WS:`, msg.type, msg.expression || msg.text?.substring(0,40) || '');
      }
      switch (msg.type) {
        case 'SKIN':
          loadSkin(msg.skin_url);
          break;
        case 'EXPRESSION': {
          // Defer expression change until queued audio finishes playing
          const remaining = audioRemainingMs();
          if (remaining > 50) {
            console.log(`[${ts}s] EXPRESSION ${msg.expression} deferred ${remaining.toFixed(0)}ms`);
            setTimeout(() => setExpression(msg.expression, msg.intensity), remaining);
          } else {
            setExpression(msg.expression, msg.intensity);
          }
          break;
        }
        case 'VISEME':
          // Server visemes ignored — client generates visemes synced to audio
          break;
        case 'SPEAKING_START':
          _isSpeaking = true;
          _hasReceivedAudio = false;
          if (_neutralResetTimer) { clearTimeout(_neutralResetTimer); _neutralResetTimer = null; }
          statusEl.textContent = 'speaking';
          statusEl.className = 'active';
          if (msg.skin_url && msg.skin_url !== _currentSkinUrl) loadSkin(msg.skin_url);
          break;
        case 'SPEAKING_END': {
          // Defer until audio actually finishes playing
          const remaining = audioRemainingMs();
          const deferMs = Math.max(0, remaining);
          const doEnd = () => {
            _isSpeaking = false;
            statusEl.textContent = 'idle';
            statusEl.className = '';
            if (_neutralResetTimer) clearTimeout(_neutralResetTimer);
            _neutralResetTimer = setTimeout(() => {
              _neutralResetTimer = null;
              setViseme('IDLE', 200, 0);
              setExpression('neutral', 1.0);
            }, 3000);
          };
          if (deferMs > 50) {
            console.log(`[${ts}s] SPEAKING_END deferred ${deferMs.toFixed(0)}ms`);
            setTimeout(doEnd, deferMs);
          } else {
            doEnd();
          }
          break;
        }
        case 'LISTENING':
          if (msg.active) {
            statusEl.textContent = 'listening';
            statusEl.className = 'listening';
            setExpression('listening');
          } else {
            statusEl.textContent = 'idle';
            statusEl.className = '';
            setExpression('neutral');
          }
          break;
        case 'PONG':
          break;
        case 'TTS_START':
          handleTtsStart(msg);
          break;
        case 'TTS_CHUNK':
          handleTtsChunk(msg);
          break;
        case 'TTS_END':
          handleTtsEnd(msg);
          break;
      }
    }

    // ── Load SVG skin ─────────────────────────────────────────
    async function loadSkin(url) {
      try {
        _currentSkinUrl = url;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        container.innerHTML = await resp.text();
        const svg = container.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '100%');
          svg.setAttribute('height', '100%');
          svg.style.maxWidth = '90vmin';
          svg.style.maxHeight = '90vmin';
        }
        showViseme('IDLE');
        showExpression('neutral');
        startIdleAnimations();
        startDrift();
        startPupilMovement();
        console.log('Skin loaded, groups:', container.querySelectorAll('g[id]').length);
      } catch (err) {
        console.error('Failed to load skin:', err);
        statusEl.textContent = 'skin load failed';
        statusEl.className = 'error';
      }
    }

    // ── Viseme rendering ──────────────────────────────────────
    function showViseme(viseme) {
      if (_exprReplacesMouth) {
        console.log('viseme BLOCKED:', viseme, '(expr has own mouth)');
        return;
      }
      const el = document.getElementById(`mouth-${viseme}`);
      if (!el && viseme !== 'IDLE') {
        console.log('viseme NOT FOUND:', viseme);
        return;
      }
      VISEMES.forEach(v => {
        const m = document.getElementById(`mouth-${v}`);
        if (m) m.style.display = (v === viseme) ? 'inline' : 'none';
      });
      currentViseme = viseme;
    }

    function setViseme(viseme, durationMs, intensity) {
      if (visemeTimeout) clearTimeout(visemeTimeout);
      showViseme(viseme);
      visemeTimeout = setTimeout(() => showViseme('IDLE'), durationMs || 80);
    }

    // ── Expression rendering ──────────────────────────────────
    function showExpression(expr) {
      console.log('showExpression:', expr);
      EXPRESSIONS.forEach(e => {
        const el = document.getElementById(`expr-${e}`);
        if (el) el.style.display = 'none';
      });
      const el = document.getElementById(`expr-${expr}`);
      if (el) {
        el.style.display = 'inline';
      } else {
        console.log('  NOT FOUND: expr-' + expr);
      }

      // Use data attributes to control base element visibility
      const baseEyes = document.getElementById('eyes-base');
      const replaceEyes = el && el.getAttribute('data-replace-eyes') === 'true';
      if (baseEyes) baseEyes.style.display = replaceEyes ? 'none' : 'inline';

      // Some expressions have their own mouth (toothy grins) — hide viseme mouths
      const replaceMouth = el && el.getAttribute('data-replace-mouth') === 'true';
      console.log('  replaceEyes:', replaceEyes, 'replaceMouth:', replaceMouth, 'el:', !!el);
      if (replaceMouth) {
        VISEMES.forEach(v => {
          const m = document.getElementById(`mouth-${v}`);
          if (m) m.style.display = 'none';
        });
      } else {
        // Restore base IDLE mouth when leaving a replace-mouth expression
        const idleMouth = document.getElementById('mouth-IDLE');
        if (idleMouth) idleMouth.style.display = 'inline';
      }

      currentExpr = expr;
      _exprReplacesMouth = replaceMouth;
    }

    let _exprReplacesMouth = false;

    function setExpression(expr, intensity) {
      const exprName = expr || 'neutral';
      showExpression(exprName);
      applyExpressionAnimation(exprName);
    }

    // ── Expression-driven animations (Nick Jr. style) ─────────
    function applyExpressionAnimation(expr) {
      const anim = EXPR_ANIMATIONS[expr] || EXPR_ANIMATIONS.neutral;

      // Cancel previous expression-specific animations
      if (shakeTimeout) { clearTimeout(shakeTimeout); shakeTimeout = null; }
      if (bounceInterval) { clearInterval(bounceInterval); bounceInterval = null; }
      if (expressionAnimFrame) { cancelAnimationFrame(expressionAnimFrame); expressionAnimFrame = null; }

      // Scale with squash/stretch
      if (anim.squash) {
        squashStretch(anim.scale);
      } else {
        scaler.style.transform = `scale(${anim.scale}) rotate(${anim.tilt}deg)`;
      }

      // Drift control
      if (anim.drift) {
        startDrift();
      } else {
        stopDrift();
        // Move toward center when not drifting
        animateToCenter();
      }

      // Shake (laughing, crying, angry, scared)
      if (anim.shake) {
        startShake(expr === 'laughing' ? 600 : expr === 'angry' ? 400 : 300);
      }

      // Bounce (happy, excited, laughing, silly, love)
      if (anim.bounce) {
        startBounce(expr === 'excited' ? 300 : 500);
      }

      // Spin (silly)
      if (anim.spin) {
        doSpin();
      }
    }

    // ── Squash & Stretch ──────────────────────────────────────
    function squashStretch(targetScale) {
      // Quick squash then stretch then settle
      scaler.style.transition = 'transform 0.1s ease-in';
      scaler.style.transform = `scale(${targetScale * 1.15}, ${targetScale * 0.85})`;
      setTimeout(() => {
        scaler.style.transition = 'transform 0.15s ease-out';
        scaler.style.transform = `scale(${targetScale * 0.9}, ${targetScale * 1.1})`;
        setTimeout(() => {
          scaler.style.transition = 'transform 0.2s ease-in-out';
          scaler.style.transform = `scale(${targetScale})`;
        }, 150);
      }, 100);
    }

    // ── Shake animation ───────────────────────────────────────
    function startShake(durationMs) {
      const startTime = performance.now();
      const shakeAmount = currentExpr === 'angry' ? 6 : 4;

      function shakeFrame() {
        const elapsed = performance.now() - startTime;
        if (elapsed > durationMs) {
          scaler.style.transform = `scale(${(EXPR_ANIMATIONS[currentExpr] || EXPR_ANIMATIONS.neutral).scale})`;
          return;
        }
        const decay = 1 - (elapsed / durationMs);
        const offsetX = (Math.random() - 0.5) * shakeAmount * 2 * decay;
        const offsetY = (Math.random() - 0.5) * shakeAmount * decay;
        const anim = EXPR_ANIMATIONS[currentExpr] || EXPR_ANIMATIONS.neutral;
        scaler.style.transform = `scale(${anim.scale}) translate(${offsetX}px, ${offsetY}px) rotate(${anim.tilt}deg)`;
        expressionAnimFrame = requestAnimationFrame(shakeFrame);
      }
      shakeFrame();
    }

    // ── Bounce animation ──────────────────────────────────────
    function startBounce(intervalMs) {
      let count = 0;
      bounceInterval = setInterval(() => {
        doHop();
        count++;
        if (count >= 3) {
          if (bounceInterval) { clearInterval(bounceInterval); bounceInterval = null; }
        }
      }, intervalMs);
    }

    // ── Spin animation (silly) ────────────────────────────────
    function doSpin() {
      scaler.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
      scaler.style.transform = 'scale(1.1) rotate(360deg)';
      setTimeout(() => {
        scaler.style.transition = 'none';
        scaler.style.transform = 'scale(1.1) rotate(0deg)';
        setTimeout(() => {
          scaler.style.transition = 'transform 0.3s ease-out';
          const anim = EXPR_ANIMATIONS[currentExpr] || EXPR_ANIMATIONS.neutral;
          scaler.style.transform = `scale(${anim.scale}) rotate(${anim.tilt}deg)`;
        }, 50);
      }, 600);
    }

    // ── Drift movement (bubbly personality — gentle sway + little hops) ─
    let swayPhase = 0;
    function startDrift() {
      if (driftInterval) return;
      // Gentle sinusoidal sway — bubbly, not random
      driftInterval = setInterval(() => {
        swayPhase += 0.15;
        const cx = centerX();
        const cy = centerY();
        // Smooth figure-8 ish pattern
        const swayX = Math.sin(swayPhase) * window.innerWidth * 0.08;
        const swayY = Math.sin(swayPhase * 0.7) * window.innerHeight * 0.04;
        posX = cx + swayX;
        posY = cy + swayY;
        mover.style.left = posX + 'px';
        mover.style.top = posY + 'px';
      }, 80);
    }

    function stopDrift() {
      if (driftInterval) { clearInterval(driftInterval); driftInterval = null; }
    }

    function animateToCenter() {
      posX = centerX();
      posY = centerY();
      mover.style.transition = 'left 0.6s ease-out, top 0.6s ease-out';
      mover.style.left = posX + 'px';
      mover.style.top = posY + 'px';
      setTimeout(() => {
        mover.style.transition = 'left 3s cubic-bezier(0.25, 0.1, 0.25, 1), top 3s cubic-bezier(0.25, 0.1, 0.25, 1)';
      }, 600);
    }

    // Little hop (bubbly personality)
    function doHop() {
      scaler.style.transition = 'transform 0.15s ease-in';
      const anim = EXPR_ANIMATIONS[currentExpr] || EXPR_ANIMATIONS.neutral;
      scaler.style.transform = `scale(${anim.scale * 0.95}, ${anim.scale * 1.05})`;
      setTimeout(() => {
        scaler.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
        scaler.style.transform = `scale(${anim.scale}) translateY(-12px)`;
        setTimeout(() => {
          scaler.style.transition = 'transform 0.25s ease-in';
          scaler.style.transform = `scale(${anim.scale * 1.04}, ${anim.scale * 0.96})`;
          setTimeout(() => {
            scaler.style.transition = 'transform 0.2s ease-out';
            scaler.style.transform = `scale(${anim.scale}) rotate(${anim.tilt}deg)`;
          }, 150);
        }, 200);
      }, 150);
    }

    // Voice-synced talk pulse — subtle head nod/sway while speaking
    let _lastPulse = 0;
    function doTalkPulse() {
      const now = performance.now();
      if (now - _lastPulse < 200) return; // throttle to ~5 pulses/sec
      _lastPulse = now;
      const anim = EXPR_ANIMATIONS[currentExpr] || EXPR_ANIMATIONS.neutral;
      // Alternate between slight left tilt and right tilt (conversational nodding)
      const direction = Math.random() > 0.5 ? 1 : -1;
      const tiltAmount = 2 + Math.random() * 3; // 2-5 degrees
      const yShift = -(1 + Math.random() * 3); // slight upward nod
      scaler.style.transition = 'transform 0.15s ease-out';
      scaler.style.transform = `scale(${anim.scale}) rotate(${direction * tiltAmount}deg) translateY(${yShift}px)`;
      setTimeout(() => {
        scaler.style.transition = 'transform 0.2s ease-in-out';
        scaler.style.transform = `scale(${anim.scale}) rotate(${anim.tilt}deg)`;
      }, 150);
    }

    // ── Pupil movement (subtle random eye tracking) ───────────
    function startPupilMovement() {
      if (pupilInterval) clearInterval(pupilInterval);
      pupilInterval = setInterval(() => {
        // Don't move pupils during expressions that have their own eyes
        if (currentExpr !== 'neutral' && currentExpr !== 'listening') return;
        const pupils = container.querySelectorAll('.pupil-left, .pupil-right');
        if (!pupils.length) return;
        // Subtle random offset (±3px)
        const dx = (Math.random() - 0.5) * 6;
        const dy = (Math.random() - 0.5) * 4;
        pupils.forEach(p => {
          const baseCx = parseFloat(p.getAttribute('cx'));
          // Use data attribute to store original position
          if (!p.dataset.origCx) p.dataset.origCx = baseCx;
          const origCx = parseFloat(p.dataset.origCx);
          const origCy = parseFloat(p.dataset.origCy || p.getAttribute('cy'));
          if (!p.dataset.origCy) p.dataset.origCy = p.getAttribute('cy');
          p.style.transition = 'cx 0.8s ease, cy 0.8s ease';
          p.setAttribute('cx', origCx + dx);
          p.setAttribute('cy', parseFloat(origCy) + dy);
        });
        // Also move the shine dots
        const shines = container.querySelectorAll('#eyes-base circle[r="6"]');
        shines.forEach(s => {
          if (!s.dataset.origCx) s.dataset.origCx = s.getAttribute('cx');
          if (!s.dataset.origCy) s.dataset.origCy = s.getAttribute('cy');
          s.setAttribute('cx', parseFloat(s.dataset.origCx) + dx);
          s.setAttribute('cy', parseFloat(s.dataset.origCy) + dy);
        });
      }, 2000 + Math.random() * 1500);
    }

    // ── Idle animations (client-side, no server traffic) ──────
    let idleHopInterval = null;

    function startIdleAnimations() {
      // Blink every 3-6 seconds
      if (blinkInterval) clearInterval(blinkInterval);
      blinkInterval = setInterval(() => {
        const blink = document.getElementById('blink');
        const baseEyes = document.getElementById('eyes-base');
        if (!blink) return;
        // Don't blink during expressions with closed eyes
        if (['happy', 'laughing', 'proud', 'winking', 'sleepy'].includes(currentExpr)) return;
        blink.style.display = 'inline';
        if (baseEyes) baseEyes.style.opacity = '0';
        setTimeout(() => {
          blink.style.display = 'none';
          if (baseEyes) baseEyes.style.opacity = '1';
        }, 120);
      }, 3000 + Math.random() * 3000);

      // Subtle breathing: slight scale pulse on face-base
      if (breatheInterval) clearInterval(breatheInterval);
      let breatheIn = true;
      breatheInterval = setInterval(() => {
        const face = document.getElementById('face-base');
        if (!face) return;
        const scale = breatheIn ? 'scale(1.004)' : 'scale(1.0)';
        face.style.transform = scale;
        face.style.transformOrigin = 'center center';
        face.style.transition = 'transform 2s ease-in-out';
        breatheIn = !breatheIn;
      }, 2000);

      // Occasional happy hop (bubbly personality)
      if (idleHopInterval) clearInterval(idleHopInterval);
      idleHopInterval = setInterval(() => {
        if (currentExpr === 'neutral' || currentExpr === 'listening') {
          doHop();
        }
      }, 8000 + Math.random() * 6000);
    }

    // ── Boot ──────────────────────────────────────────────────
    // Initialize audio context on first click (browser autoplay policy)
    document.getElementById('audio-unlock').addEventListener('click', () => {
      ensureAudioContext();
    });

    window.addEventListener('resize', initPosition);
    initPosition();
    loadSkin('/avatar/skin/default.svg');
    connect();
  </script>
</body>
</html>
