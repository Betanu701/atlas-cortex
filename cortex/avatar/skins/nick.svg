<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" id="atlas-avatar-nick" data-viseme-bank="cartoon">
  <!--
    Atlas Cortex — "Nick" Avatar Skin
    Inspired by Nick Jr.'s Face: screen-filling warm blob, big bold black
    eyes, wide expressive mouth. Simple, graphic, alive.
    Viseme bank: cartoon (6 exaggerated mouth shapes)
  -->
  <defs>
    <!-- Face fill — warm saturated orange with subtle radial shading -->
    <radialGradient id="n-face" cx="48%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#FFB844"/>
      <stop offset="70%" stop-color="#FF9E1B"/>
      <stop offset="100%" stop-color="#F08A00"/>
    </radialGradient>
    <!-- Soft highlight on upper face -->
    <radialGradient id="n-hi" cx="46%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Tear gradient -->
    <linearGradient id="n-tear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Heart gradient -->
    <linearGradient id="n-heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <!-- Sparkle -->
    <radialGradient id="n-sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </radialGradient>
    <!-- Mouth interior -->
    <radialGradient id="n-mouth-fill" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <!-- Clip paths for teeth -->
    <clipPath id="clip-teeth"><ellipse cx="200" cy="290" rx="48" ry="18"/></clipPath>
    <clipPath id="clip-open"><ellipse cx="200" cy="296" rx="48" ry="32"/></clipPath>
    <clipPath id="clip-fv"><ellipse cx="200" cy="286" rx="42" ry="12"/></clipPath>
  </defs>

  <!-- ── Base face — large rounded blob filling the frame ────── -->
  <g id="face-base">
    <!-- Main blob shape (squircle / superellipse feel) -->
    <rect x="18" y="18" width="364" height="364" rx="120" ry="120" fill="url(#n-face)" stroke="#E08500" stroke-width="3"/>
    <!-- Highlight -->
    <rect x="20" y="20" width="360" height="360" rx="118" ry="118" fill="url(#n-hi)"/>
  </g>

  <!-- ── Eyes — big bold black ovals with white glint ────────── -->
  <g id="eyes-base">
    <!-- Left eye -->
    <ellipse cx="148" cy="170" rx="36" ry="42" fill="#111"/>
    <ellipse cx="156" cy="158" rx="10" ry="12" fill="white" opacity="0.9" class="pupil-left"/>
    <!-- Right eye -->
    <ellipse cx="252" cy="170" rx="36" ry="42" fill="#111"/>
    <ellipse cx="244" cy="158" rx="10" ry="12" fill="white" opacity="0.9" class="pupil-right"/>
  </g>

  <!-- ── Mouth shapes (visemes) ─────────────────────────────── -->

  <!-- IDLE: big friendly curve smile -->
  <g id="mouth-IDLE" style="display:none">
    <path d="M120 280 Q200 340 280 280" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- CLOSED: lips pressed (b, p, m) — firm wide line -->
  <g id="mouth-CLOSED" style="display:none">
    <path d="M140 290 Q200 298 260 290" fill="#111" stroke="#111" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- OPEN: big wide mouth (a, ah) — huge dark oval, teeth, tongue -->
  <g id="mouth-OPEN" style="display:none">
    <ellipse cx="200" cy="296" rx="52" ry="34" fill="url(#n-mouth-fill)"/>
    <rect x="158" y="270" width="84" height="10" rx="4" fill="white" clip-path="url(#clip-open)"/>
    <ellipse cx="200" cy="314" rx="24" ry="12" fill="#C0392B" opacity="0.5"/>
  </g>

  <!-- ROUND: O shape (o, u, w) — round dark hole -->
  <g id="mouth-ROUND" style="display:none">
    <ellipse cx="200" cy="292" rx="26" ry="28" fill="url(#n-mouth-fill)"/>
  </g>

  <!-- TEETH: wide grin showing teeth (e, i, s) -->
  <g id="mouth-TEETH" style="display:none">
    <ellipse cx="200" cy="290" rx="50" ry="20" fill="url(#n-mouth-fill)"/>
    <rect x="162" y="282" width="76" height="10" rx="4" fill="white" clip-path="url(#clip-teeth)"/>
  </g>

  <!-- FV: lip bite (f, v) -->
  <g id="mouth-FV" style="display:none">
    <path d="M148 284 Q200 278 252 284" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <rect x="172" y="286" width="56" height="6" rx="3" fill="white" opacity="0.85" clip-path="url(#clip-fv)"/>
    <path d="M160 292 Q200 306 240 292" fill="#111" opacity="0.4"/>
  </g>

  <!-- Legacy viseme aliases -->
  <g id="mouth-PP" style="display:none"><use href="#mouth-CLOSED"/></g>
  <g id="mouth-FF" style="display:none"><use href="#mouth-FV"/></g>
  <g id="mouth-TH" style="display:none"><use href="#mouth-TEETH"/></g>
  <g id="mouth-DD" style="display:none"><use href="#mouth-CLOSED"/></g>
  <g id="mouth-KK" style="display:none"><use href="#mouth-OPEN"/></g>
  <g id="mouth-SS" style="display:none"><use href="#mouth-TEETH"/></g>
  <g id="mouth-SH" style="display:none"><use href="#mouth-ROUND"/></g>
  <g id="mouth-RR" style="display:none"><use href="#mouth-ROUND"/></g>
  <g id="mouth-NN" style="display:none"><use href="#mouth-CLOSED"/></g>
  <g id="mouth-IH" style="display:none"><use href="#mouth-TEETH"/></g>
  <g id="mouth-EH" style="display:none"><use href="#mouth-TEETH"/></g>
  <g id="mouth-AA" style="display:none"><use href="#mouth-OPEN"/></g>
  <g id="mouth-OH" style="display:none"><use href="#mouth-ROUND"/></g>
  <g id="mouth-OU" style="display:none"><use href="#mouth-ROUND"/></g>

  <!-- ── Expression overlays ────────────────────────────────── -->

  <!-- neutral: no overlay -->
  <g id="expr-neutral" style="display:none"></g>

  <!-- happy: crescent eyes + bigger smile area -->
  <g id="expr-happy" style="display:none" data-replace-eyes="true">
    <path d="M112 174 Q148 148 184 174" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <path d="M216 174 Q252 148 288 174" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- thinking: eyes look up-right, one squished -->
  <g id="expr-thinking" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="168" rx="36" ry="42" fill="#111"/>
    <ellipse cx="160" cy="152" rx="10" ry="12" fill="white" opacity="0.9"/>
    <ellipse cx="252" cy="172" rx="36" ry="36" fill="#111"/>
    <ellipse cx="258" cy="156" rx="10" ry="12" fill="white" opacity="0.9"/>
  </g>

  <!-- surprised: huge round eyes -->
  <g id="expr-surprised" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="170" rx="42" ry="48" fill="#111"/>
    <ellipse cx="158" cy="156" rx="12" ry="14" fill="white" opacity="0.9"/>
    <ellipse cx="252" cy="170" rx="42" ry="48" fill="#111"/>
    <ellipse cx="242" cy="156" rx="12" ry="14" fill="white" opacity="0.9"/>
  </g>

  <!-- sad: droopy eyes with small highlight low, tear -->
  <g id="expr-sad" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="175" rx="32" ry="34" fill="#111"/>
    <ellipse cx="154" cy="168" rx="8" ry="10" fill="white" opacity="0.8"/>
    <ellipse cx="252" cy="175" rx="32" ry="34" fill="#111"/>
    <ellipse cx="246" cy="168" rx="8" ry="10" fill="white" opacity="0.8"/>
    <ellipse cx="176" cy="216" rx="5" ry="8" fill="url(#n-tear)"/>
  </g>

  <!-- excited: big sparkly eyes -->
  <g id="expr-excited" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="170" rx="40" ry="46" fill="#111"/>
    <ellipse cx="158" cy="154" rx="11" ry="13" fill="white" opacity="0.95"/>
    <ellipse cx="142" cy="172" rx="4" ry="5" fill="white" opacity="0.5"/>
    <ellipse cx="252" cy="170" rx="40" ry="46" fill="#111"/>
    <ellipse cx="242" cy="154" rx="11" ry="13" fill="white" opacity="0.95"/>
    <ellipse cx="258" cy="172" rx="4" ry="5" fill="white" opacity="0.5"/>
    <circle cx="80" cy="100" r="10" fill="url(#n-sparkle)"/>
    <circle cx="326" cy="110" r="7" fill="url(#n-sparkle)"/>
  </g>

  <!-- concerned: slightly smaller eyes -->
  <g id="expr-concerned" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="174" rx="30" ry="34" fill="#111"/>
    <ellipse cx="155" cy="165" rx="8" ry="10" fill="white" opacity="0.85"/>
    <ellipse cx="252" cy="174" rx="30" ry="34" fill="#111"/>
    <ellipse cx="245" cy="165" rx="8" ry="10" fill="white" opacity="0.85"/>
  </g>

  <!-- listening -->
  <g id="expr-listening" style="display:none"></g>

  <!-- laughing: crescents + huge toothy grin -->
  <g id="expr-laughing" style="display:none" data-replace-eyes="true" data-replace-mouth="true">
    <path d="M112 170 Q148 144 184 170" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
    <path d="M216 170 Q252 144 288 170" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="182" cy="186" rx="5" ry="7" fill="url(#n-tear)"/>
    <ellipse cx="218" cy="188" rx="4.5" ry="6.5" fill="url(#n-tear)"/>
    <!-- Huge grin -->
    <path d="M118 270 Q200 348 282 270" fill="white" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- crying: teary eyes, streams -->
  <g id="expr-crying" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="175" rx="32" ry="36" fill="#111"/>
    <ellipse cx="155" cy="166" rx="8" ry="10" fill="white" opacity="0.8"/>
    <ellipse cx="148" cy="175" rx="32" ry="36" fill="#87CEFA" opacity="0.12"/>
    <ellipse cx="252" cy="175" rx="32" ry="36" fill="#111"/>
    <ellipse cx="245" cy="166" rx="8" ry="10" fill="white" opacity="0.8"/>
    <ellipse cx="252" cy="175" rx="32" ry="36" fill="#87CEFA" opacity="0.12"/>
    <ellipse cx="174" cy="218" rx="5" ry="8" fill="url(#n-tear)"/>
    <ellipse cx="170" cy="240" rx="4" ry="6" fill="url(#n-tear)"/>
    <ellipse cx="232" cy="220" rx="5" ry="8" fill="url(#n-tear)"/>
    <ellipse cx="236" cy="242" rx="4" ry="6" fill="url(#n-tear)"/>
  </g>

  <!-- silly: one crescent, one wide, toothy grin -->
  <g id="expr-silly" style="display:none" data-replace-eyes="true" data-replace-mouth="true">
    <path d="M112 172 Q148 150 184 172" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <path d="M216 172 Q252 150 288 172" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <!-- Big toothy grin -->
    <path d="M126 272 Q200 340 274 272" fill="white" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- winking: left crescent, right big eye -->
  <g id="expr-winking" style="display:none" data-replace-eyes="true">
    <path d="M112 174 Q148 152 184 174" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <ellipse cx="252" cy="170" rx="38" ry="44" fill="#111"/>
    <ellipse cx="244" cy="156" rx="10" ry="12" fill="white" opacity="0.9"/>
    <ellipse cx="258" cy="170" rx="4" ry="5" fill="white" opacity="0.5"/>
  </g>

  <!-- angry: angled eyes -->
  <g id="expr-angry" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="178" rx="30" ry="32" fill="#111"/>
    <ellipse cx="155" cy="170" rx="8" ry="10" fill="white" opacity="0.85"/>
    <ellipse cx="252" cy="178" rx="30" ry="32" fill="#111"/>
    <ellipse cx="245" cy="170" rx="8" ry="10" fill="white" opacity="0.85"/>
    <!-- Angry V brows (thick black) -->
    <path d="M108 152 Q148 136 188 148" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
    <path d="M212 148 Q252 136 292 152" fill="none" stroke="#111" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- confused: eyes opposite directions -->
  <g id="expr-confused" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="172" rx="34" ry="40" fill="#111"/>
    <ellipse cx="138" cy="160" rx="9" ry="11" fill="white" opacity="0.9"/>
    <ellipse cx="252" cy="172" rx="34" ry="40" fill="#111"/>
    <ellipse cx="264" cy="160" rx="9" ry="11" fill="white" opacity="0.9"/>
    <text x="316" y="130" font-family="sans-serif" font-size="44" font-weight="bold" fill="#111" opacity="0.5">?</text>
  </g>

  <!-- love: heart eyes -->
  <g id="expr-love" style="display:none" data-replace-eyes="true">
    <path d="M126 170 C126 152,148 142,148 162 C148 142,170 152,170 170 L148 198 Z" fill="url(#n-heart)"/>
    <path d="M230 170 C230 152,252 142,252 162 C252 142,274 152,274 170 L252 198 Z" fill="url(#n-heart)"/>
    <path d="M75 90 C75 80,88 75,88 85 C88 75,101 80,101 90 L88 104 Z" fill="#FF69B4" opacity="0.5"/>
    <path d="M310 80 C310 71,322 67,322 76 C322 67,334 71,334 80 L322 92 Z" fill="#FF69B4" opacity="0.4"/>
  </g>

  <!-- sleepy: half-lidded -->
  <g id="expr-sleepy" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="180" rx="34" ry="24" fill="#111"/>
    <ellipse cx="154" cy="175" rx="7" ry="8" fill="white" opacity="0.7"/>
    <!-- Heavy upper lid -->
    <path d="M112 168 Q148 158 184 168" fill="#F08A00" stroke="#E08500" stroke-width="2"/>
    <ellipse cx="252" cy="180" rx="34" ry="24" fill="#111"/>
    <ellipse cx="246" cy="175" rx="7" ry="8" fill="white" opacity="0.7"/>
    <path d="M216 168 Q252 158 288 168" fill="#F08A00" stroke="#E08500" stroke-width="2"/>
    <text x="306" y="118" font-family="sans-serif" font-size="28" font-weight="bold" fill="#6C63FF" opacity="0.5">z</text>
    <text x="326" y="96" font-family="sans-serif" font-size="22" font-weight="bold" fill="#6C63FF" opacity="0.35">z</text>
    <text x="342" y="78" font-family="sans-serif" font-size="16" font-weight="bold" fill="#6C63FF" opacity="0.2">z</text>
  </g>

  <!-- proud: confident closed eyes -->
  <g id="expr-proud" style="display:none" data-replace-eyes="true">
    <path d="M112 174 Q148 156 184 174" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <path d="M216 174 Q252 156 288 174" fill="none" stroke="#111" stroke-width="7" stroke-linecap="round"/>
    <circle cx="330" cy="100" r="12" fill="url(#n-sparkle)"/>
  </g>

  <!-- scared: huge eyes tiny pupils -->
  <g id="expr-scared" style="display:none" data-replace-eyes="true">
    <ellipse cx="148" cy="172" rx="40" ry="46" fill="#111"/>
    <ellipse cx="148" cy="168" rx="5" ry="6" fill="white" opacity="0.95"/>
    <ellipse cx="252" cy="172" rx="40" ry="46" fill="#111"/>
    <ellipse cx="252" cy="168" rx="5" ry="6" fill="white" opacity="0.95"/>
  </g>

  <!-- ── Blink overlay ──────────────────────────────────────── -->
  <g id="blink" style="display:none">
    <path d="M112 174 Q148 188 184 174" fill="#F08A00" stroke="#E08500" stroke-width="3" stroke-linecap="round"/>
    <path d="M216 174 Q252 188 288 174" fill="#F08A00" stroke="#E08500" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
