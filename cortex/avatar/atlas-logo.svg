<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Electric blue glow -->
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#00D4FF" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0" />
    </radialGradient>
    <!-- Core gradient -->
    <linearGradient id="logo-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#0099CC" />
    </linearGradient>
    <!-- Orbital ring gradient -->
    <linearGradient id="orbit-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.2" />
    </linearGradient>
    <!-- Pulse animation -->
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="128" cy="128" r="90" fill="url(#logo-glow)" />

  <!-- Stylized "A" mark -->
  <g filter="url(#glow-filter)">
    <!-- Left leg of A -->
    <path d="M 88 190 L 120 70 L 128 70 L 108 190 Z" fill="url(#logo-fill)" />
    <!-- Right leg of A -->
    <path d="M 148 190 L 136 70 L 128 70 L 168 190 Z" fill="url(#logo-fill)" />
    <!-- Crossbar of A (slightly angled, modern) -->
    <rect x="98" y="140" width="60" height="10" rx="3" fill="url(#logo-fill)" opacity="0.9" />
    <!-- Apex dot (neural node) -->
    <circle cx="128" cy="62" r="8" fill="#00D4FF" />
  </g>

  <!-- Orbital ring (tilted ellipse) -->
  <ellipse cx="128" cy="128" rx="80" ry="30"
    fill="none" stroke="url(#orbit-fill)" stroke-width="2.5"
    transform="rotate(-20, 128, 128)"
    stroke-dasharray="6 4" />

  <!-- Second orbital ring (perpendicular) -->
  <ellipse cx="128" cy="128" rx="70" ry="25"
    fill="none" stroke="url(#orbit-fill)" stroke-width="1.5"
    transform="rotate(35, 128, 128)"
    stroke-dasharray="4 6" opacity="0.5" />

  <!-- Small orbital nodes -->
  <circle cx="58" cy="108" r="3" fill="#00D4FF" opacity="0.7" />
  <circle cx="198" cy="148" r="3" fill="#00D4FF" opacity="0.7" />
  <circle cx="170" cy="80" r="2.5" fill="#00D4FF" opacity="0.5" />
</svg>
